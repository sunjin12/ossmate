name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref. Saves CI minutes when a force-push
# triggers a new run while the previous one is still in matrix expansion.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }} / py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't tear down the whole matrix when one cell fails — we want full
      # signal across OS/Python combos for portability claims.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      # Install only what tests actually need. The CLI tests use Typer's
      # CliRunner, so typer is required; the SDK is intentionally NOT
      # installed because tests only exercise --dry-run paths.
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest typer

      - name: Install Ossmate packages (editable)
        run: |
          python -m pip install -e ./mcp/ossmate_mcp
          python -m pip install -e ./cli/ossmate --no-deps

      - name: Verify version markers are in sync
        run: python scripts/bump_version.py --check

      - name: Run pytest
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: pytest -q --tb=short

  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install ruff
      - run: ruff check mcp/ossmate_mcp/src cli/ossmate/src .claude/hooks scripts tests

  build:
    name: build distributions
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build
      - name: Build ossmate-mcp
        run: python -m build mcp/ossmate_mcp
      - name: Build ossmate
        run: python -m build cli/ossmate
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: ossmate-dists-${{ github.sha }}
          path: |
            mcp/ossmate_mcp/dist/*
            cli/ossmate/dist/*
          if-no-files-found: error
          retention-days: 7
